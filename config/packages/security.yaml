security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\LoginFormAuthenticator
            logout:
                path: app_logout
                target: app_home
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 2592000  # 30 jours
                path: /
            entry_point: App\Security\LoginFormAuthenticator

    role_hierarchy:
        ROLE_MAKER:     [ROLE_USER]
        ROLE_MANAGER:   [ROLE_MAKER]
        ROLE_ADMIN:     [ROLE_MANAGER]
        ROLE_SUPER_ADMIN: [ROLE_ADMIN]

    access_control:
        - { path: ^/payment/webhook, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/gestionnaire, roles: ROLE_MANAGER }
        - { path: ^/maker, roles: ROLE_MAKER }
        - { path: ^/dashboard, roles: ROLE_USER }
        - { path: ^/memorial/create, roles: ROLE_USER }
        - { path: '^/memorial/[^/]+/manage', roles: ROLE_USER }  #empoie de ''
        - { path: ^/payment/webhook/pawapay, roles: PUBLIC_ACCESS }
        - { path: ^/payment/pawapay/retour, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10